# Deploy to Google Cloud Run
name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend
        id: backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: researchmind-backend
          image: ghcr.io/${{ steps.owner.outputs.value }}/researchmind-backend:latest
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          flags: >-
            --allow-unauthenticated
            --port=8000
            --memory=2Gi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=300
          env_vars: |
            LITELLM_BASE_URL=https://api.groq.com/openai
            LLM_MODEL=llama-3.1-8b-instant
            QDRANT_PORT=6333
            QDRANT_LOCAL_PATH=
            QDRANT_COLLECTION=research_papers
            EMBEDDING_MODEL=all-MiniLM-L6-v2
            EMBEDDING_DIM=384
            LITELLM_API_KEY=${{ secrets.GROQ_API_KEY }}
            QDRANT_HOST=${{ secrets.QDRANT_HOST }}
            QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}

      - name: Deploy frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: researchmind-frontend
          image: ghcr.io/${{ steps.owner.outputs.value }}/researchmind-frontend:latest
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          flags: >-
            --allow-unauthenticated
            --port=8501
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=2
          env_vars: BACKEND_URL=${{ steps.backend.outputs.url }}

      - name: Print URLs
        run: |
          echo "Backend:  ${{ steps.backend.outputs.url }}"
          echo "Frontend: open Cloud Run console for frontend URL"
