name: Deploy frontend2 to GitHub Pages

on:
  push:
    branches: [main, experimental-feature]
    paths:
      - 'frontend2/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend2/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend2
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: frontend2
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: /research-mind
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend2/out

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
