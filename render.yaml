# Render.com deployment config — backend only
# Frontend is served via GitHub Pages (static export)
#
# Setup: Connect repo → New → Blueprint, then set secret env vars in Render dashboard

services:
  - type: web
    name: researchmind-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LITELLM_BASE_URL
        value: https://api.groq.com/openai
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: LITELLM_API_KEY
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_PORT
        value: "6333"
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_LOCAL_PATH
        value: ""
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: EMBEDDING_DIM
        value: "384"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
