model_list:
  - model_name: local-llm
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434

  - model_name: local-llm-small
    litellm_params:
      model: ollama/qwen2.5:3b
      api_base: http://ollama:11434

  # Odkomentuj aby używać OpenAI / Anthropic:
