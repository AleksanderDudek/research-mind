apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: researchmind
data:
  LITELLM_BASE_URL: "http://litellm:4000"
  LLM_MODEL: "groq-llama"
  QDRANT_PORT: "6333"
  QDRANT_LOCAL_PATH: ""
  QDRANT_COLLECTION: "research_papers"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  EMBEDDING_DIM: "384"
  LANGFUSE_HOST: ""
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: researchmind
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: researchmind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: backend
          image: ghcr.io/aleksanderdudek/researchmind-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: researchmind-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: "2Gi"
