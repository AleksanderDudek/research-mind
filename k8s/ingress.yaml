# Traefik ingress — built into k3s
# Replace YOUR_DOMAIN with your actual domain or Oracle Cloud public IP
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: researchmind-ingress
  namespace: researchmind
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Let's Encrypt TLS via cert-manager (optional)
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  # tls:
  #   - hosts:
  #       - YOUR_DOMAIN
  #     secretName: researchmind-tls
  rules:
    - host: YOUR_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8501
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /query
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /documents
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
