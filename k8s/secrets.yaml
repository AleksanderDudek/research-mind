# SECRET TEMPLATE — do NOT commit real values to git
# Apply with actual values via:
#   kubectl apply -f k8s/secrets.yaml -n researchmind
#
# Or use sealed-secrets / external-secrets operator for production.
# All values must be base64-encoded: echo -n 'value' | base64

apiVersion: v1
kind: Secret
metadata:
  name: researchmind-secrets
  namespace: researchmind
type: Opaque
data:
  # echo -n 'gsk_...' | base64
  LITELLM_API_KEY: REPLACE_BASE64

  # echo -n 'xyz.eu-central.aws.cloud.qdrant.io' | base64
  QDRANT_HOST: REPLACE_BASE64

  # echo -n 'your-qdrant-api-key' | base64
  QDRANT_API_KEY: REPLACE_BASE64

  # Langfuse (leave empty to disable — echo -n '' | base64 → '')
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
